# paths
data_calibration : 'data/Raw eeg 2/calibration'
data_test        : 'data/Raw eeg 2/test'

# experiment params
fs                      : 250
trial_duration_s        : 8
num_trials              : 40
num_chans               : 16
ignore_participants     : [1, 2, 3, 4, 5, 6, 20, 35, 39, 40, 53, 62, 64]
task_start_time_s       : 1.0
task_end_time_s         : 5.0

# analysis: CSP + LDA
csp_params                  :
    category                : 'iir'
    type                    : 'butter'
    order                   : 5
    csp_components      : 4
    bands       : [
                                [7, 12],   # mu / lower alpha
                                [12, 16],  # lower beta
                                [16, 20],  # mid beta
                                [20, 24],  # mid beta
                                [24, 30],  # upper beta
                            ]
